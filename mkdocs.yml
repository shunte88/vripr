site_name: vripr — The vinyl viper for perfect rips
site_description: Audacity vinyl ripping helper with AcoustID, MusicBrainz and Discogs
site_url: https://shunte88.github.io/vripr
repo_url: https://github.com/shunte88/vripr
repo_name: shunte88/vripr
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: teal
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Configuration: configuration.md
  - Contributing: ../CONTRIBUTING.md
  - Changelog: ../CHANGELOG.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
